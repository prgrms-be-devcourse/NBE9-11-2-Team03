spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 도커로 띄운 MySQL에 붙을 때 쓰는 로컬 연결 주소다.
    url: jdbc:mysql://localhost:3306/festival?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: festival
    password: 1234

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
